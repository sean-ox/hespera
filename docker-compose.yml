version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Shared security defaults applied to every service via YAML anchors.
# Each service that needs different limits overrides the relevant key.
# ─────────────────────────────────────────────────────────────────────────────
x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true   # prevent setuid/setgid privilege escalation
  cap_drop:
    - ALL                      # drop every Linux capability by default

x-resource-defaults: &resource-defaults
  deploy:
    resources:
      limits:
        cpus: '0.50'
        memory: 512M
      reservations:
        cpus: '0.10'
        memory: 128M

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    <<: *security-defaults
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bugbounty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-bugbounty}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/migrations:/docker-entrypoint-initdb.d
    # No ports: exposed to host — internal Docker network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bugbounty}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bounty_network
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    <<: *security-defaults
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # No ports: exposed to host — internal Docker network only
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bounty_network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M

  # ── Orchestrator ────────────────────────────────────────────────────────────

  orchestrator:
    build: .
    <<: *security-defaults
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MAX_CONCURRENT_RECON=${MAX_CONCURRENT_RECON:-2}
      - RECON_TIMEOUT_SECONDS=${RECON_TIMEOUT_SECONDS:-1800}
      - SCHEDULE_INTERVAL_MINUTES=${SCHEDULE_INTERVAL_MINUTES:-360}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JSON_LOGS=${JSON_LOGS:-true}
      - URO_BIN=uro
      - UNFURL_BIN=unfurl
      - QSREPLACE_BIN=qsreplace
      - DALFOX_BIN=dalfox
      - SUBZY_BIN=subzy
      - JSLUICE_BIN=jsluice
      - TRUFFLEHOG_BIN=trufflehog
    volumes:
      - ./bash:/app/bash:ro
      - ./scope.txt:/app/scope.txt:ro
      - bounty_output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - bounty_network
    command: ["python", "-m", "python.main"]
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  # ── Workers ─────────────────────────────────────────────────────────────────

  recon_worker:
    build: .
    <<: *security-defaults
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MAX_CONCURRENT_RECON=${MAX_CONCURRENT_RECON:-2}
      - RECON_TIMEOUT_SECONDS=${RECON_TIMEOUT_SECONDS:-1800}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JSON_LOGS=${JSON_LOGS:-true}
      - WORKER_TYPE=recon
      - SUBFINDER_BIN=subfinder
      - ASSETFINDER_BIN=assetfinder
      - HTTPX_BIN=httpx
      - GAU_BIN=gau
      - WAYBACKURLS_BIN=waybackurls
      - KATANA_BIN=katana
    volumes:
      - ./bash:/app/bash:ro
      - ./scope.txt:/app/scope.txt:ro
      - bounty_output:/app/output
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - bounty_network
    command: ["python", "-m", "python.workers.recon_worker"]
    # Recon tools are network-heavy but not CPU-heavy
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  nuclei_worker:
    build: .
    <<: *security-defaults
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JSON_LOGS=${JSON_LOGS:-true}
      - WORKER_TYPE=nuclei
      - NUCLEI_BIN=nuclei
    volumes:
      - ./bash:/app/bash:ro
      - bounty_output:/app/output
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - bounty_network
    command: ["python", "-m", "python.workers.nuclei_worker"]
    # Nuclei can be CPU-intensive during large template runs
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  filter_worker:
    build: .
    <<: [*security-defaults, *resource-defaults]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JSON_LOGS=${JSON_LOGS:-true}
      - WORKER_TYPE=filter
      - URO_BIN=uro
      - UNFURL_BIN=unfurl
    volumes:
      - ./bash:/app/bash:ro
      - bounty_output:/app/output
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - bounty_network
    command: ["python", "-m", "python.workers.filter_worker"]

  xss_worker:
    build: .
    <<: [*security-defaults, *resource-defaults]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JSON_LOGS=${JSON_LOGS:-true}
      - DALFOX_BIN=dalfox
    volumes:
      - ./bash:/app/bash:ro
      - bounty_output:/app/output
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - bounty_network
    command: ["python", "-m", "python.workers.xss_worker"]

  takeover_worker:
    build: .
    <<: [*security-defaults, *resource-defaults]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JSON_LOGS=${JSON_LOGS:-true}
      - SUBZY_BIN=subzy
    volumes:
      - ./bash:/app/bash:ro
      - bounty_output:/app/output
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - bounty_network
    command: ["python", "-m", "python.workers.takeover_worker"]

  js_worker:
    build: .
    <<: *security-defaults
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JSON_LOGS=${JSON_LOGS:-true}
      - JSLUICE_BIN=jsluice
      - TRUFFLEHOG_BIN=trufflehog
    volumes:
      - ./bash:/app/bash:ro
      - bounty_output:/app/output
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - bounty_network
    command: ["python", "-m", "python.workers.js_worker"]
    # JS worker downloads files — needs slightly more memory
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 768M
        reservations:
          cpus: '0.10'
          memory: 128M

  notify_worker:
    build: .
    <<: *security-defaults
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JSON_LOGS=${JSON_LOGS:-true}
      - WORKER_TYPE=notify
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - bounty_network
    command: ["python", "-m", "python.workers.notify_worker"]
    # Notify worker is lightweight — just Telegram HTTP calls
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  bounty_output:

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  bounty_network:
    driver: bridge